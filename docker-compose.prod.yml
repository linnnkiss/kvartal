version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kvartal_db}
      POSTGRES_USER: ${POSTGRES_USER:-kvartal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kvartal_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kvartal_user} -d ${POSTGRES_DB:-kvartal_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kvartal_user}:${POSTGRES_PASSWORD:-kvartal_pass}@db:5432/${POSTGRES_DB:-kvartal_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://89.104.69.27:3030,http://linkiss.koderevox.ru:3030,http://linkiss.koderevox.ru}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - api
    ports:
      - "3030:80"
    restart: unless-stopped

volumes:
  postgres_data:
