version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kvartal_db
    environment:
      POSTGRES_DB: kvartal_db
      POSTGRES_USER: kvartal_user
      POSTGRES_PASSWORD: kvartal_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvartal_user -d kvartal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: kvartal_api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://kvartal_user:kvartal_pass@db:5432/kvartal_db
      JWT_SECRET: docker-secret-change-in-prod
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
